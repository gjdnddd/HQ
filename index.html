<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HQ</title>
<style>
  :root {
    --bg1: #0f1115; --bg2: #171a21; --bg3: #1f232c;
    --text1: #f2f3f5; --text2: #b8bcc4; --text3: #7c8190;
    --border1: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.12);
    --blue: #4f8cff; --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg1); color: var(--text1);
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    padding-bottom: 72px;
  }
  header {
    padding: 20px 16px 12px; position: sticky; top: 0; background: var(--bg1); z-index: 10;
  }
  header h1 { font-size: 20px; margin: 0 0 2px; }
  header .updated { font-size: 12px; color: var(--text3); }

  .tabbar {
    position: fixed; bottom: 0; left: 0; right: 0; display: flex;
    background: var(--bg2); border-top: 1px solid var(--border1); z-index: 20;
  }
  .tabbar button {
    flex: 1; padding: 14px 0; background: none; border: none; color: var(--text3);
    font-size: 13px; cursor: pointer;
  }
  .tabbar button.active { color: var(--blue); font-weight: 600; }

  .tab-content { display: none; padding: 0 16px; }
  .tab-content.active { display: block; }

  .card {
    background: var(--bg2); border: 1px solid var(--border1); border-radius: var(--radius);
    padding: 16px; margin-bottom: 12px;
  }
  .card h2 { font-size: 15px; margin: 0 0 12px; color: var(--text2); }

  .quick-nav { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .quick-nav a {
    display: block; background: var(--bg3); border-radius: var(--radius-sm);
    padding: 12px; color: var(--text1); text-decoration: none; font-size: 13px; text-align: center;
  }

  .summary-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .summary-pill {
    background: var(--bg3); border-radius: 999px; padding: 6px 12px; font-size: 12px; color: var(--text2);
  }
  .summary-pill b { color: var(--text1); }

  .search-box {
    display: flex; gap: 8px; margin-bottom: 12px;
  }
  .search-box input {
    flex: 1; padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text1); font-size: 14px; outline: none;
  }

  .result-item {
    padding: 10px 4px; border-bottom: 1px solid var(--border1); font-size: 13px;
  }
  .result-item:last-child { border-bottom: none; }
  .result-item .name { color: var(--text1); }
  .result-item .meta { color: var(--text3); font-size: 11px; margin-top: 2px; }
  .result-item a { color: var(--blue); text-decoration: none; }
  .label-edit-btn {
    margin-top: 6px; padding: 4px 10px; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 999px; color: var(--text2); font-size: 11px; cursor: pointer;
  }

  .gist-section input {
    width: 100%; padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text1); font-size: 13px; outline: none; margin-bottom: 8px;
  }
  .gist-section button, .btn {
    padding: 10px 16px; background: var(--blue); border: none; border-radius: var(--radius-sm);
    color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .form-label { font-size: 12px; color: var(--text3); margin-bottom: 4px; display: block; }
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm);
    padding: 10px 16px; font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .empty { color: var(--text3); font-size: 13px; padding: 12px 0; text-align: center; }

  #tab-map2.tab-content { padding: 0; }
  .map-frame {
    width: 100%;
    height: calc(100vh - 76px);
    border: none;
    display: block;
  }

  .goal-group-title {
    font-size: 12px; color: var(--text3); margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .goal-group-title:first-child { margin-top: 0; }
  .goal-item {
    padding: 10px 0; border-bottom: 1px solid var(--border1);
  }
  .goal-item:last-child { border-bottom: none; }
  .goal-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .goal-title { font-size: 13px; color: var(--text1); }
  .goal-period { font-size: 11px; color: var(--text3); margin-left: 6px; }
  .goal-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .goal-actions button {
    background: none; border: none; color: var(--text3); font-size: 13px; cursor: pointer; padding: 2px 4px;
  }
  .goal-progress-wrap { margin-top: 6px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .goal-progress-bar { flex: 1; height: 6px; background: var(--bg3); border-radius: 999px; overflow: hidden; }
  .goal-progress-fill { height: 100%; background: var(--blue); border-radius: 999px; }
  .goal-progress-pct { font-size: 11px; color: var(--text3); width: 38px; text-align: right; }
  .goal-check {
    margin-top: 6px; font-size: 12px; color: var(--text2); cursor: pointer; user-select: none;
  }
  .goal-check.done { color: var(--blue); }

  .goal-form-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .goal-form-row select, .goal-form-row input {
    padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 8px; color: var(--text1); font-size: 13px; outline: none;
  }
  .goal-form-row select { flex: 0 0 90px; }
  .goal-form-row input.goal-title-input { flex: 1; }
  .goal-form-row input.goal-num-input { flex: 1; min-width: 0; }

  .todo-row {
    display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 13px; color: var(--text1);
  }
  .todo-row input[type="checkbox"] { flex-shrink: 0; width: 15px; height: 15px; accent-color: var(--blue); }
  .todo-grade {
    flex-shrink: 0; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 999px;
    background: var(--bg3); color: var(--text2);
  }
  .todo-sub-title { font-size: 11px; color: var(--text3); margin-top: 6px; }
  .todo-sub-title:first-child { margin-top: 0; }
  .todo-note {
    font-size: 11px; color: var(--text3); margin: 0 0 4px 21px; white-space: pre-line; line-height: 1.4;
  }

  .home-goal-row { padding: 8px 0; border-bottom: 1px solid var(--border1); }
  .home-goal-row:last-child { border-bottom: none; }

  .goal-weekly-text { font-size: 13px; color: var(--text1); margin-top: 6px; }
  .goal-stats-line { font-size: 11px; color: var(--text3); margin-top: 4px; display: flex; align-items: center; gap: 6px; }
  .goal-stats-line button {
    background: none; border: none; color: var(--text3); font-size: 11px; text-decoration: underline; cursor: pointer; padding: 0;
  }
  .goal-controls { display: flex; gap: 6px; margin-top: 8px; }
  .goal-controls button {
    padding: 6px 12px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 999px;
    color: var(--text1); font-size: 12px; cursor: pointer;
  }
  .goal-controls button.running { background: var(--blue); color: #fff; border-color: var(--blue); }
  .stopwatch-live { font-variant-numeric: tabular-nums; font-weight: 600; }

  .goal-form-row.goal-form-row-wide input { flex: 1; }
</style>
</head>
<body>

<header>
  <h1>HQ</h1>
  <div class="updated" id="updated-label">자료지도 불러오는 중...</div>
</header>

<div id="tab-home" class="tab-content active">
  <div class="card">
    <h2>오늘업무 · 주간업무</h2>
    <div id="home-todo"><div class="empty">불러오는 중...</div></div>
  </div>

  <div class="card">
    <h2>이번 달·주 목표</h2>
    <div id="home-goals"></div>
  </div>

  <div class="card">
    <h2>빠른 이동</h2>
    <div class="quick-nav">
      <a href="https://gjdnddd.github.io/todo-app/" target="_blank">할 일</a>
      <a href="https://gjdnddd.github.io/control-tower/" target="_blank">컨트롤타워</a>
    </div>
  </div>

</div>

<div id="tab-goals" class="tab-content">
  <div class="card">
    <h2>목표 추가</h2>
    <div class="goal-form-row goal-form-row-wide">
      <input type="text" id="goal-category" placeholder="분야 (예: 건강, 투자, 자기관리)" />
    </div>
    <div class="goal-form-row">
      <select id="goal-track-type" onchange="onTrackTypeChange()">
        <option value="manual" selected>수동</option>
        <option value="stopwatch">스톱워치</option>
        <option value="counter">카운터</option>
      </select>
      <input type="text" id="goal-title" class="goal-title-input" placeholder="목표 제목 (예: 독서 4권)" />
    </div>
    <div class="goal-form-row" id="goal-period-row">
      <select id="goal-period-type">
        <option value="year">연간</option>
        <option value="quarter">분기</option>
        <option value="month" selected>월</option>
        <option value="week">주</option>
      </select>
      <input type="text" id="goal-period-label" class="goal-title-input" placeholder="예: 2026-07" />
    </div>
    <div class="goal-form-row">
      <input type="number" id="goal-target" class="goal-num-input" placeholder="목표 수치 (선택)" />
      <input type="text" id="goal-unit" class="goal-num-input" placeholder="단위 (예: 시간, 세트, 권)" />
    </div>
    <button class="btn" onclick="addGoal()">목표 추가 후 Gist에 저장</button>
  </div>

  <div class="card">
    <h2>목표 현황</h2>
    <div id="goals-list"></div>
  </div>
</div>

<div id="tab-map" class="tab-content">
  <div class="card">
    <h2>자료지도 요약</h2>
    <div class="summary-row" id="home-summary">
      <span class="summary-pill">불러오는 중...</span>
    </div>
  </div>

  <div class="card">
    <h2>자주 쓰는 자료</h2>
    <div id="pinned-list"></div>
  </div>

  <div class="card">
    <h2>자료지도 검색</h2>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="키워드로 검색 (예: 세금, 컨트롤타워)" />
    </div>
    <div id="search-results"></div>
  </div>

  <div class="card">
    <h2>자료 수동 등록</h2>
    <label class="form-label">이름</label>
    <input type="text" id="manual-name" placeholder="예: 2026 연말정산 자료" style="width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text1);font-size:13px;margin-bottom:8px;" />
    <label class="form-label">경로 또는 URL</label>
    <input type="text" id="manual-path" placeholder="폴더 경로 또는 웹 URL" style="width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text1);font-size:13px;margin-bottom:8px;" />
    <label class="form-label">키워드 (쉼표로 구분)</label>
    <input type="text" id="manual-keywords" placeholder="세금, 연말정산" style="width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text1);font-size:13px;margin-bottom:8px;" />
    <button class="btn" onclick="addManualItem()">추가 후 Gist에 저장</button>
  </div>

  <div class="card gist-section">
    <h2>Gist 연동</h2>
    <label class="form-label">Personal Access Token</label>
    <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" />
    <label class="form-label">Gist ID</label>
    <input type="text" id="gist-id-input" placeholder="adff7f6a437517b81a7186f3bce352c8" />
    <button onclick="saveGistConfig()">설정 저장</button>
    <button onclick="syncGist()" style="margin-left:8px;background:var(--bg3);color:var(--text1);">지금 불러오기</button>
  </div>
</div>

<div id="tab-map2" class="tab-content">
  <iframe class="map-frame" src="https://gjdnddd.github.io/react-workflow-map/" title="워크플로우 맵" loading="lazy"></iframe>
</div>

<div class="tabbar">
  <button class="active" data-tab="home" onclick="switchTab('home')">홈</button>
  <button data-tab="goals" onclick="switchTab('goals')">목표</button>
  <button data-tab="map" onclick="switchTab('map')">자료지도</button>
  <button data-tab="map2" onclick="switchTab('map2')">맵</button>
</div>

<div class="toast" id="toast"></div>

<script>
const GIST_FILENAME = 'hq_scan_result.json';
const GOALS_FILENAME = 'hq_goals.json';
const DEFAULT_GIST_ID = 'adff7f6a437517b81a7186f3bce352c8';

// 봇 차단용 저민감도 키 (todo-app index.html에도 동일하게 하드코딩되어 있음 — 처리지침 문서 참고)
const TODO_READ_URL = 'https://asia-northeast3-infin-stock-bot.cloudfunctions.net/todo-inbox-read';
const TODO_WRITE_URL = 'https://asia-northeast3-infin-stock-bot.cloudfunctions.net/todo-inbox-write';
const TODO_API_KEY = 'tZrCvMfEa16iuQdFcnmGyDASHk9l5h3q0oK2xTbLY4wVWpjR';

let state = {
  gistToken: '',
  gistId: DEFAULT_GIST_ID,
  mapData: { updated_at: null, items: [] },
  goalsData: { updated_at: null, goals: [] },
};

// todo-app 원본 데이터 캐시 (완료 처리 시 전체를 다시 write해야 해서 보관)
let todoRaw = { items: [], topics: [], recurring: [], checklist_sets: [] };

function loadLocal() {
  const raw = localStorage.getItem('hq_state');
  if (raw) {
    try {
      const parsed = JSON.parse(raw);
      state = Object.assign(state, parsed);
    } catch (e) {}
  }
}

function saveLocal() {
  localStorage.setItem('hq_state', JSON.stringify(state));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tabbar button').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelector(`.tabbar button[data-tab="${name}"]`).classList.add('active');
}

// ══════════════════════════════════════════════
//  GIST API (기존 대시보드 패턴 재사용)
// ══════════════════════════════════════════════
async function syncGist() {
  const token = state.gistToken;
  const gistId = state.gistId;
  if (!gistId) { showToast('Gist ID를 먼저 입력해주세요'); return; }
  try {
    const headers = { Accept: 'application/vnd.github.v3+json' };
    if (token) headers.Authorization = `token ${token}`;
    const res = await fetch(`https://api.github.com/gists/${gistId}`, { headers });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();

    const mapContent = await readGistFile(data, GIST_FILENAME);
    if (mapContent) state.mapData = JSON.parse(mapContent);

    const goalsContent = await readGistFile(data, GOALS_FILENAME);
    if (goalsContent) state.goalsData = JSON.parse(goalsContent);

    saveLocal();
    renderAll();
    showToast('불러오기 완료');
  } catch (e) {
    showToast('불러오기 실패: ' + e.message);
  }
}

async function readGistFile(gistData, filename) {
  const file = gistData.files[filename];
  if (!file) return null;
  let content = file.content;
  if (file.truncated && file.raw_url) {
    const rawRes = await fetch(file.raw_url);
    if (!rawRes.ok) throw new Error(rawRes.status);
    content = await rawRes.text();
  }
  return content;
}

async function saveFileToGist(filename, dataObj, successMsg) {
  const token = state.gistToken;
  const gistId = state.gistId;
  if (!token || !gistId) { showToast('토큰과 Gist ID를 먼저 입력해주세요'); return; }
  try {
    const body = JSON.stringify({
      files: { [filename]: { content: JSON.stringify(dataObj, null, 2) } }
    });
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      method: 'PATCH',
      headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
      body
    });
    if (!res.ok) throw new Error(res.status);
    saveLocal();
    showToast(successMsg || 'Gist에 저장 완료');
  } catch (e) {
    showToast('Gist 저장 실패 — 토큰 확인');
  }
}

function saveToGist() {
  return saveFileToGist(GIST_FILENAME, state.mapData, '자료지도 저장 완료');
}

function saveGoalsToGist() {
  return saveFileToGist(GOALS_FILENAME, state.goalsData, '목표 저장 완료');
}

function saveGistConfig() {
  state.gistToken = document.getElementById('token-input').value.trim();
  state.gistId = document.getElementById('gist-id-input').value.trim() || DEFAULT_GIST_ID;
  saveLocal();
  showToast('설정 저장 완료');
}

// ══════════════════════════════════════════════
//  할일 위젯 (읽기 전용 — 관리는 todo-app에서)
// ══════════════════════════════════════════════
async function fetchTodoWidget() {
  const el = document.getElementById('home-todo');
  try {
    const res = await fetch(TODO_READ_URL, { headers: { 'X-API-Key': TODO_API_KEY } });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    todoRaw = {
      items: data.items || [],
      topics: data.topics || [],
      recurring: data.recurring || [],
      checklist_sets: data.checklist_sets || [],
    };
    renderHomeTodo();
  } catch (e) {
    el.innerHTML = '<div class="empty">할일 불러오기 실패</div>';
  }
}

const DAYS_KO = ['일', '월', '화', '수', '목', '금', '토'];

function freqLabel(r) {
  if (r.freq === 'daily') return '매일';
  if (r.freq === 'weekly') return `매주 ${DAYS_KO[r.day_of_week]}`;
  if (r.freq === 'biweekly') return `격주 ${DAYS_KO[r.day_of_week]}`;
  if (r.freq === 'monthly') return r.day_of_month === 0 ? '매월 말일' : `매월 ${r.day_of_month}일`;
  return '';
}

// checklist_sets는 매일 리셋됨(자정 지나면 checked_today 초기화) — todo-app과 동일 로직
function checkResetChecklistSets() {
  const today = localDateStr(new Date());
  todoRaw.checklist_sets.forEach(cs => {
    if (cs.last_reset_date !== today) { cs.checked_today = []; cs.last_reset_date = today; }
  });
}

// ── todo-app과 동일한 "이번 주" 범위·데드라인 판정 (오늘업무/주간업무 자동편입용) ──
function getWeekRange() {
  const now = new Date();
  const day = now.getDay();
  const diffToMonday = day === 0 ? -6 : 1 - day;
  const monday = new Date(now); monday.setDate(now.getDate() + diffToMonday); monday.setHours(0, 0, 0, 0);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6); sunday.setHours(23, 59, 59, 999);
  return { monday, sunday };
}
function isDateThisWeek(dateStr) {
  const parts = dateStr.split('-').map(Number);
  const target = new Date(parts[0], parts[1] - 1, parts[2], 12, 0, 0);
  const { monday, sunday } = getWeekRange();
  return target >= monday && target <= sunday;
}

// ── todo-app과 동일한 단일 반복업무 활성 판정 (저장된 status를 그대로 믿지 않고 매번 재계산) ──
function lastOccurrence(dow) {
  const d = new Date(); const diff = (d.getDay() - dow + 7) % 7;
  d.setDate(d.getDate() - diff); d.setHours(0, 0, 0, 0); return d;
}
function getLastDayOfMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
function shouldActivateRec(r) {
  const now = new Date();
  if (r.freq === 'daily') {
    if (!r.last_done_at) return true;
    return new Date(r.last_done_at).toDateString() !== now.toDateString();
  }
  if (r.freq === 'weekly') {
    if (now.getDay() !== r.day_of_week) return false;
    if (!r.last_done_at) return true;
    return new Date(r.last_done_at) < lastOccurrence(r.day_of_week);
  }
  if (r.freq === 'biweekly') {
    if (now.getDay() !== r.day_of_week) return false;
    if (!r.last_activated_at) return true;
    return (now - new Date(r.last_activated_at)) >= 13 * 24 * 60 * 60 * 1000;
  }
  if (r.freq === 'monthly') {
    const target = r.day_of_month === 0 ? getLastDayOfMonth(now.getFullYear(), now.getMonth()) : r.day_of_month;
    if (now.getDate() !== target) return false;
    if (!r.last_done_at) return true;
    const d = new Date(r.last_done_at);
    return d.getFullYear() < now.getFullYear() || (d.getFullYear() === now.getFullYear() && d.getMonth() < now.getMonth());
  }
  return false;
}
function checkRecActivation() {
  const nowIso = new Date().toISOString();
  todoRaw.recurring.forEach(r => {
    if (shouldActivateRec(r)) {
      if (r.status !== 'active') r.activated_at = nowIso;
      r.status = 'active';
      if (r.freq === 'biweekly') r.last_activated_at = nowIso;
    }
  });
}

function renderHomeTodo() {
  const el = document.getElementById('home-todo');
  const today = localDateStr(new Date());
  const wid = mondayISO(new Date());

  const candidates = todoRaw.items.filter(i => i.deadline_type === 'exact' && i.deadline_value && i.status !== 'done');

  const pinnedTodayItems = todoRaw.items.filter(i =>
    i.pinned_today === today && i.status !== 'done' &&
    !(i.deadline_type === 'exact' && i.deadline_value === today)
  );
  const todayItems = [...candidates.filter(i => i.deadline_value === today), ...pinnedTodayItems];
  const todayIds = new Set(todayItems.map(i => i.id));

  const pinnedWeekItems = todoRaw.items.filter(i =>
    i.pinned_week === wid && i.status !== 'done' && !todayIds.has(i.id) &&
    !(i.deadline_type === 'exact' && i.deadline_value && isDateThisWeek(i.deadline_value))
  );
  const weekItems = [
    ...candidates.filter(i => i.deadline_value !== today && isDateThisWeek(i.deadline_value)),
    ...pinnedWeekItems,
  ];

  checkRecActivation();
  const activeRecurring = todoRaw.recurring.filter(r => r.status === 'active');

  checkResetChecklistSets();
  const checklistGroups = todoRaw.checklist_sets
    .map(cs => ({ cs, remaining: cs.items.filter(it => !cs.checked_today.includes(it.id)).sort((a, b) => a.order - b.order) }))
    .filter(g => g.remaining.length > 0);

  if (!todayItems.length && !weekItems.length && !activeRecurring.length && !checklistGroups.length) {
    el.innerHTML = '<div class="empty">오늘·주간 업무가 없어요 (todo-app 업무 탭에서 지정)</div>';
    return;
  }

  let html = '';
  if (todayItems.length) {
    html += '<div class="todo-sub-title">오늘업무</div>' + todayItems.map(i => todoRowHtml(i)).join('');
  }
  if (weekItems.length || activeRecurring.length) {
    html += '<div class="todo-sub-title">주간업무</div>'
      + weekItems.map(i => todoRowHtml(i)).join('')
      + activeRecurring.map(r => recurringRowHtml(r)).join('');
  }
  if (checklistGroups.length) {
    html += '<div class="todo-sub-title">반복업무</div>' + checklistGroups.map(g => checklistGroupHtml(g)).join('');
  }
  el.innerHTML = html;
}

function noteHtml(note) {
  return note ? `<div class="todo-note">${escapeHtml(note)}</div>` : '';
}

function todoRowHtml(i) {
  return `<div class="todo-row"><input type="checkbox" onclick="completeTodoItem('${i.id}')" /><span>${escapeHtml(i.text)}</span></div>${noteHtml(i.note)}`;
}

function recurringRowHtml(r) {
  return `<div class="todo-row"><input type="checkbox" onclick="completeRecurringItem('${r.id}')" /><span>${escapeHtml(r.text)} <span class="goal-period">${escapeHtml(freqLabel(r))}</span></span></div>${noteHtml(r.note)}`;
}

function checklistGroupHtml(g) {
  const subItems = g.remaining.map(it =>
    `<div class="todo-row" style="padding-left:14px"><input type="checkbox" onclick="completeChecklistSubItem('${g.cs.id}','${it.id}')" /><span>${escapeHtml(it.text)}</span></div>`
  ).join('');
  return `<div class="todo-sub-title" style="margin-top:8px">${escapeHtml(g.cs.title)}</div>${subItems}`;
}

async function writeTodoBack(successMsg) {
  try {
    const res = await fetch(TODO_WRITE_URL, {
      method: 'POST',
      headers: { 'X-API-Key': TODO_API_KEY, 'Content-Type': 'application/json; charset=utf-8' },
      body: JSON.stringify({
        items: todoRaw.items,
        topics: todoRaw.topics,
        recurring: todoRaw.recurring,
        checklist_sets: todoRaw.checklist_sets,
        deleted_ids: [], deleted_topic_ids: [], deleted_recurring_ids: [], deleted_checklist_set_ids: [],
      }),
    });
    if (!res.ok) throw new Error(res.status);
    showToast(successMsg || '완료 처리됨');
  } catch (e) {
    showToast('완료 반영 실패 — 새로고침 후 다시 시도해주세요');
  }
}

function completeTodoItem(id) {
  const item = todoRaw.items.find(i => i.id === id);
  if (!item) return;
  item.status = 'done';
  item.completed_at = new Date().toISOString();
  renderHomeTodo();
  writeTodoBack();
}

function completeRecurringItem(id) {
  const r = todoRaw.recurring.find(x => x.id === id);
  if (!r) return;
  r.status = 'done';
  r.last_done_at = new Date().toISOString();
  r.skipped = false;
  renderHomeTodo();
  writeTodoBack();
}

function completeChecklistSubItem(setId, itemId) {
  const cs = todoRaw.checklist_sets.find(c => c.id === setId);
  if (!cs) return;
  if (!cs.checked_today.includes(itemId)) cs.checked_today.push(itemId);
  renderHomeTodo();
  writeTodoBack();
}

// ══════════════════════════════════════════════

// ══════════════════════════════════════════════
function round2(n) { return Math.round(n * 100) / 100; }

// 로컬 타임존 기준 YYYY-MM-DD (toISOString은 UTC라서 자정 근처에 날짜가 하루 밀릴 수 있어 사용 안 함)
function localDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function mondayISO(d) {
  const date = new Date(d);
  const day = date.getDay(); // 0=일 ... 1=월
  const diff = day === 0 ? -6 : 1 - day;
  date.setDate(date.getDate() + diff);
  return localDateStr(date);
}

function daysBetweenISO(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}

function defaultPeriodLabel(type) {
  const now = new Date();
  const y = now.getFullYear();
  if (type === 'year') return String(y);
  if (type === 'quarter') return `${y}-Q${Math.floor(now.getMonth() / 3) + 1}`;
  if (type === 'week') {
    const firstDay = new Date(y, 0, 1);
    const week = Math.ceil(((now - firstDay) / 86400000 + firstDay.getDay() + 1) / 7);
    return `${y}-W${week}`;
  }
  return `${y}-${String(now.getMonth() + 1).padStart(2, '0')}`;
}

document.getElementById('goal-period-type').addEventListener('change', (e) => {
  document.getElementById('goal-period-label').value = defaultPeriodLabel(e.target.value);
});

function onTrackTypeChange() {
  const isManual = document.getElementById('goal-track-type').value === 'manual';
  document.getElementById('goal-period-row').style.display = isManual ? 'flex' : 'none';
}

// 스톱워치/카운터 목표의 주간·4주 버킷을 오늘 날짜 기준으로 리셋. 리셋 발생 시 true 반환.
function ensureGoalBuckets(g) {
  if (g.track_type !== 'stopwatch' && g.track_type !== 'counter') return false;
  let changed = false;
  const thisMonday = mondayISO(new Date());

  if (g.weekly_current === undefined) { g.weekly_current = 0; g.week_start_date = thisMonday; changed = true; }
  else if (g.week_start_date !== thisMonday) { g.weekly_current = 0; g.week_start_date = thisMonday; changed = true; }

  if (g.four_week_current === undefined) { g.four_week_current = 0; g.four_week_start_date = thisMonday; changed = true; }
  else if (daysBetweenISO(g.four_week_start_date, thisMonday) >= 28) { g.four_week_current = 0; g.four_week_start_date = thisMonday; changed = true; }

  if (g.total_current === undefined) { g.total_current = 0; changed = true; }
  if (g.running_since === undefined) { g.running_since = null; }

  return changed;
}

function addGoal() {
  const category = document.getElementById('goal-category').value.trim();
  const trackType = document.getElementById('goal-track-type').value;
  const title = document.getElementById('goal-title').value.trim();
  const targetRaw = document.getElementById('goal-target').value.trim();
  const unit = document.getElementById('goal-unit').value.trim();
  if (!title) { showToast('목표 제목을 입력해주세요'); return; }

  const goal = {
    id: crypto.randomUUID(),
    category,
    track_type: trackType,
    title,
    target: targetRaw ? Number(targetRaw) : null,
    unit,
    created_at: new Date().toISOString(),
  };

  if (trackType === 'manual') {
    const periodType = document.getElementById('goal-period-type').value;
    const periodLabel = document.getElementById('goal-period-label').value.trim() || defaultPeriodLabel(periodType);
    goal.period_type = periodType;
    goal.period_label = periodLabel;
    goal.current = 0;
    goal.done = false;
  } else {
    const thisMonday = mondayISO(new Date());
    goal.weekly_current = 0;
    goal.week_start_date = thisMonday;
    goal.four_week_current = 0;
    goal.four_week_start_date = thisMonday;
    goal.total_current = 0;
    goal.running_since = null;
  }

  state.goalsData.goals = state.goalsData.goals || [];
  state.goalsData.goals.push(goal);
  state.goalsData.updated_at = new Date().toISOString();
  saveLocal();
  renderGoals();
  renderHomeGoals();

  document.getElementById('goal-category').value = '';
  document.getElementById('goal-title').value = '';
  document.getElementById('goal-target').value = '';
  document.getElementById('goal-unit').value = '';

  saveGoalsToGist();
}

function findGoal(id) {
  return (state.goalsData.goals || []).find(g => g.id === id);
}

function persistGoalChange() {
  state.goalsData.updated_at = new Date().toISOString();
  saveLocal();
  renderGoals();
  renderHomeGoals();
  saveGoalsToGist();
}

function updateGoalCurrent(id) {
  const goal = findGoal(id);
  if (!goal) return;
  const raw = prompt(`현재 수치 (목표 ${goal.target}${goal.unit || ''})`, goal.current);
  if (raw === null) return;
  const num = Number(raw);
  if (Number.isNaN(num)) { showToast('숫자를 입력해주세요'); return; }
  goal.current = num;
  if (goal.target && num >= goal.target) goal.done = true;
  persistGoalChange();
}

function overrideWeeklyCurrent(id) {
  const goal = findGoal(id);
  if (!goal) return;
  const raw = prompt('이번주 누적 직접 수정 (덮어쓰기)', goal.weekly_current);
  if (raw === null) return;
  const num = Number(raw);
  if (Number.isNaN(num)) { showToast('숫자를 입력해주세요'); return; }
  ensureGoalBuckets(goal);
  goal.weekly_current = goal.track_type === 'stopwatch' ? round2(num) : Math.round(num);
  persistGoalChange();
}

function editGoal(id) {
  const goal = findGoal(id);
  if (!goal) return;

  const newCategory = prompt('분야', goal.category || '');
  if (newCategory === null) return;
  const newTitle = prompt('목표 제목', goal.title);
  if (newTitle === null) return;
  const newTargetRaw = prompt('목표 수치 (선택, 비우면 없음)', goal.target ?? '');
  if (newTargetRaw === null) return;
  const newUnit = prompt('단위', goal.unit || '');
  if (newUnit === null) return;

  goal.category = newCategory.trim();
  goal.title = newTitle.trim() || goal.title;
  goal.target = newTargetRaw.trim() ? Number(newTargetRaw) : null;
  goal.unit = newUnit.trim();

  if (goal.track_type === 'manual') {
    const newPeriodType = prompt('기간유형 (year/quarter/month/week)', goal.period_type || 'month');
    if (newPeriodType !== null && ['year', 'quarter', 'month', 'week'].includes(newPeriodType.trim())) {
      goal.period_type = newPeriodType.trim();
    }
    const newPeriodLabel = prompt('기간 라벨', goal.period_label || '');
    if (newPeriodLabel !== null) goal.period_label = newPeriodLabel.trim() || goal.period_label;
  }

  persistGoalChange();
}

function toggleGoalDone(id) {
  const goal = findGoal(id);
  if (!goal) return;
  goal.done = !goal.done;
  persistGoalChange();
}

function deleteGoal(id) {
  if (!confirm('이 목표를 삭제할까요?')) return;
  state.goalsData.goals = (state.goalsData.goals || []).filter(g => g.id !== id);
  persistGoalChange();
}

function startStopwatch(id) {
  const goal = findGoal(id);
  if (!goal) return;
  ensureGoalBuckets(goal);
  goal.running_since = Date.now();
  saveLocal();
  renderGoals();
}

function stopStopwatch(id) {
  const goal = findGoal(id);
  if (!goal || !goal.running_since) return;
  const elapsedMs = Date.now() - goal.running_since;
  goal.running_since = null;
  const elapsedHours = elapsedMs / 3600000;

  if (elapsedHours > 5) {
    showToast('5시간 초과로 기록하지 않았어요 — 직접 입력을 이용해주세요');
    persistGoalChange();
    return;
  }

  const amount = round2(elapsedHours);
  ensureGoalBuckets(goal);
  goal.weekly_current = round2(goal.weekly_current + amount);
  goal.four_week_current = round2(goal.four_week_current + amount);
  goal.total_current = round2(goal.total_current + amount);
  persistGoalChange();
}

function incrementCounter(id) {
  const goal = findGoal(id);
  if (!goal) return;
  ensureGoalBuckets(goal);
  goal.weekly_current += 1;
  goal.four_week_current += 1;
  goal.total_current += 1;
  persistGoalChange();
}

function manualAddAmount(id) {
  const goal = findGoal(id);
  if (!goal) return;
  const isStopwatch = goal.track_type === 'stopwatch';
  const raw = prompt(isStopwatch ? '추가할 시간 (시간 단위, 예: 1.5)' : '추가할 개수');
  if (raw === null) return;
  const num = Number(raw);
  if (Number.isNaN(num)) { showToast('숫자를 입력해주세요'); return; }

  ensureGoalBuckets(goal);
  const amount = isStopwatch ? round2(num) : Math.round(num);
  goal.weekly_current = round2(goal.weekly_current + amount);
  goal.four_week_current = round2(goal.four_week_current + amount);
  goal.total_current = round2(goal.total_current + amount);
  persistGoalChange();
}

function resetGoalTotal(id) {
  const goal = findGoal(id);
  if (!goal) return;
  if (!confirm('총 누적을 0으로 리셋할까요? (분기/반기/연간 새 시작용)')) return;
  goal.total_current = 0;
  persistGoalChange();
}

function renderGoals() {
  const el = document.getElementById('goals-list');
  const goals = state.goalsData.goals || [];
  if (!goals.length) {
    el.innerHTML = '<div class="empty">아직 목표가 없어요. 위에서 추가해보세요.</div>';
    return;
  }

  let anyReset = false;
  goals.forEach(g => { if (ensureGoalBuckets(g)) anyReset = true; });
  if (anyReset) { saveLocal(); saveGoalsToGist(); }

  const groups = {};
  goals.forEach(g => {
    const key = g.category || '미분류';
    (groups[key] = groups[key] || []).push(g);
  });

  const catNames = Object.keys(groups).sort((a, b) => {
    if (a === '미분류') return 1;
    if (b === '미분류') return -1;
    return a.localeCompare(b, 'ko');
  });

  el.innerHTML = catNames.map(cat => {
    const items = groups[cat].map(g => goalItemHtml(g)).join('');
    return `<div class="goal-group-title">${escapeHtml(cat)}</div>${items}`;
  }).join('');
}

function renderHomeGoals() {
  const el = document.getElementById('home-goals');
  const goals = state.goalsData.goals || [];
  const curMonth = defaultPeriodLabel('month');
  const curWeek = defaultPeriodLabel('week');
  const relevant = goals.filter(g =>
    g.track_type === 'stopwatch' || g.track_type === 'counter' ||
    (g.period_type === 'month' && g.period_label === curMonth) ||
    (g.period_type === 'week' && g.period_label === curWeek)
  );

  if (!relevant.length) {
    el.innerHTML = '<div class="empty">이번 달·주 목표가 없어요</div>';
    return;
  }

  el.innerHTML = relevant.map(g => {
    const isAuto = g.track_type === 'stopwatch' || g.track_type === 'counter';
    let status;
    if (isAuto) {
      status = `이번주 ${g.weekly_current}${escapeHtml(g.unit || '')}` + (g.target ? `/${g.target}${escapeHtml(g.unit || '')}` : '');
    } else {
      const hasTarget = g.target !== null && g.target !== undefined && g.target !== '' && !Number.isNaN(Number(g.target));
      status = hasTarget
        ? `${g.current}${escapeHtml(g.unit || '')}/${g.target}${escapeHtml(g.unit || '')}`
        : (g.done ? '✅ 완료' : '⬜ 진행중');
    }
    const cat = g.category ? `${escapeHtml(g.category)} · ` : '';
    return `<div class="home-goal-row">${escapeHtml(g.title)} <span class="goal-period">${cat}${status}</span></div>`;
  }).join('');
}

function goalItemHtml(g) {
  if (g.track_type === 'stopwatch' || g.track_type === 'counter') {
    const weeklyText = `이번주 ${g.weekly_current}${escapeHtml(g.unit || '')}` + (g.target ? ` / ${g.target}${escapeHtml(g.unit || '')}` : '');
    const statsLine = `4주 누적 ${g.four_week_current}${escapeHtml(g.unit || '')} · 총 누적 ${g.total_current}${escapeHtml(g.unit || '')} <button onclick="resetGoalTotal('${g.id}')">리셋</button>`;

    let controlsHtml;
    if (g.track_type === 'stopwatch') {
      const running = !!g.running_since;
      controlsHtml = running
        ? `<button class="running" onclick="stopStopwatch('${g.id}')">■ 정지 <span class="stopwatch-live" data-start="${g.running_since}">00:00</span></button>
           <button onclick="manualAddAmount('${g.id}')">직접 입력</button>`
        : `<button onclick="startStopwatch('${g.id}')">▶ 시작</button>
           <button onclick="manualAddAmount('${g.id}')">직접 입력</button>`;
    } else {
      controlsHtml = `<button onclick="incrementCounter('${g.id}')">+1</button>
        <button onclick="manualAddAmount('${g.id}')">직접 입력</button>`;
    }

    return `<div class="goal-item">
      <div class="goal-top">
        <div><span class="goal-title">${escapeHtml(g.title)}</span></div>
        <div class="goal-actions"><button onclick="editGoal('${g.id}')" title="수정">✎</button><button onclick="deleteGoal('${g.id}')" title="삭제">✕</button></div>
      </div>
      <div class="goal-weekly-text" style="cursor:pointer" onclick="overrideWeeklyCurrent('${g.id}')">${weeklyText}</div>
      <div class="goal-stats-line">${statsLine}</div>
      <div class="goal-controls">${controlsHtml}</div>
    </div>`;
  }

  const hasTarget = g.target !== null && g.target !== undefined && g.target !== '' && !Number.isNaN(Number(g.target));
  const progressHtml = hasTarget
    ? `<div class="goal-weekly-text" style="cursor:pointer" onclick="updateGoalCurrent('${g.id}')">${g.current}${escapeHtml(g.unit || '')} / ${g.target}${escapeHtml(g.unit || '')}</div>`
    : `<div class="goal-check ${g.done ? 'done' : ''}" onclick="toggleGoalDone('${g.id}')">${g.done ? '✅ 완료' : '⬜ 완료 표시'}</div>`;

  return `<div class="goal-item">
    <div class="goal-top">
      <div><span class="goal-title">${escapeHtml(g.title)}</span><span class="goal-period">${escapeHtml(g.period_label || '')}</span></div>
      <div class="goal-actions"><button onclick="editGoal('${g.id}')" title="수정">✎</button><button onclick="deleteGoal('${g.id}')" title="삭제">✕</button></div>
    </div>
    ${progressHtml}
  </div>`;
}

setInterval(() => {
  document.querySelectorAll('.stopwatch-live').forEach(el => {
    const start = Number(el.dataset.start);
    if (!start) return;
    const elapsedSec = Math.floor((Date.now() - start) / 1000);
    const m = String(Math.floor(elapsedSec / 60)).padStart(2, '0');
    const s = String(elapsedSec % 60).padStart(2, '0');
    el.textContent = `${m}:${s}`;
  });
}, 1000);

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

document.getElementById('search-input').addEventListener('input', (e) => renderSearch(e.target.value));

// 초기화
loadLocal();
document.getElementById('token-input').value = state.gistToken || '';
document.getElementById('gist-id-input').value = state.gistId || DEFAULT_GIST_ID;
document.getElementById('goal-period-label').value = defaultPeriodLabel('month');
state.goalsData = state.goalsData || { updated_at: null, goals: [] };
renderAll();
syncGist();
fetchTodoWidget();
</script>

</body>
</html>

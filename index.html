<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HQ</title>
<style>
  :root {
    --bg1: #0f1115; --bg2: #171a21; --bg3: #1f232c;
    --text1: #f2f3f5; --text2: #b8bcc4; --text3: #7c8190;
    --border1: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.12);
    --blue: #4f8cff; --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg1); color: var(--text1);
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    padding-bottom: 72px;
  }
  header {
    padding: 20px 16px 12px; position: sticky; top: 0; background: var(--bg1); z-index: 10;
  }
  header h1 { font-size: 20px; margin: 0 0 2px; }
  header .updated { font-size: 12px; color: var(--text3); }

  .tabbar {
    position: fixed; bottom: 0; left: 0; right: 0; display: flex;
    background: var(--bg2); border-top: 1px solid var(--border1); z-index: 20;
  }
  .tabbar button {
    flex: 1; padding: 14px 0; background: none; border: none; color: var(--text3);
    font-size: 13px; cursor: pointer;
  }
  .tabbar button.active { color: var(--blue); font-weight: 600; }

  .tab-content { display: none; padding: 0 16px; }
  .tab-content.active { display: block; }

  .card {
    background: var(--bg2); border: 1px solid var(--border1); border-radius: var(--radius);
    padding: 16px; margin-bottom: 12px;
  }
  .card h2 { font-size: 15px; margin: 0 0 12px; color: var(--text2); }

  .quick-nav { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .quick-nav a {
    display: block; background: var(--bg3); border-radius: var(--radius-sm);
    padding: 12px; color: var(--text1); text-decoration: none; font-size: 13px; text-align: center;
  }

  .summary-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .summary-pill {
    background: var(--bg3); border-radius: 999px; padding: 6px 12px; font-size: 12px; color: var(--text2);
  }
  .summary-pill b { color: var(--text1); }

  .search-box {
    display: flex; gap: 8px; margin-bottom: 12px;
  }
  .search-box input {
    flex: 1; padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text1); font-size: 14px; outline: none;
  }

  .result-item {
    padding: 10px 4px; border-bottom: 1px solid var(--border1); font-size: 13px;
  }
  .result-item:last-child { border-bottom: none; }
  .result-item .name { color: var(--text1); }
  .result-item .meta { color: var(--text3); font-size: 11px; margin-top: 2px; }
  .result-item a { color: var(--blue); text-decoration: none; }
  .label-edit-btn {
    margin-top: 6px; padding: 4px 10px; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 999px; color: var(--text2); font-size: 11px; cursor: pointer;
  }

  .gist-section input {
    width: 100%; padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text1); font-size: 13px; outline: none; margin-bottom: 8px;
  }
  .gist-section button, .btn {
    padding: 10px 16px; background: var(--blue); border: none; border-radius: var(--radius-sm);
    color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .form-label { font-size: 12px; color: var(--text3); margin-bottom: 4px; display: block; }
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm);
    padding: 10px 16px; font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .empty { color: var(--text3); font-size: 13px; padding: 12px 0; text-align: center; }

  #tab-map2.tab-content { padding: 0; }
  .map-frame {
    width: 100%;
    height: calc(100vh - 76px);
    border: none;
    display: block;
  }

  .goal-group-title {
    font-size: 12px; color: var(--text3); margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .goal-group-title:first-child { margin-top: 0; }
  .goal-item {
    padding: 10px 0; border-bottom: 1px solid var(--border1);
  }
  .goal-item:last-child { border-bottom: none; }
  .goal-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .goal-title { font-size: 13px; color: var(--text1); }
  .goal-period { font-size: 11px; color: var(--text3); margin-left: 6px; }
  .goal-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .goal-actions button {
    background: none; border: none; color: var(--text3); font-size: 13px; cursor: pointer; padding: 2px 4px;
  }
  .goal-progress-wrap { margin-top: 6px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .goal-progress-bar { flex: 1; height: 6px; background: var(--bg3); border-radius: 999px; overflow: hidden; }
  .goal-progress-fill { height: 100%; background: var(--blue); border-radius: 999px; }
  .goal-progress-pct { font-size: 11px; color: var(--text3); width: 38px; text-align: right; }
  .goal-check {
    margin-top: 6px; font-size: 12px; color: var(--text2); cursor: pointer; user-select: none;
  }
  .goal-check.done { color: var(--blue); }

  .goal-form-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .goal-form-row select, .goal-form-row input {
    padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 8px; color: var(--text1); font-size: 13px; outline: none;
  }
  .goal-form-row select { flex: 0 0 90px; }
  .goal-form-row input.goal-title-input { flex: 1; }
  .goal-form-row input.goal-num-input { flex: 1; min-width: 0; }
</style>
</head>
<body>

<header>
  <h1>HQ</h1>
  <div class="updated" id="updated-label">자료지도 불러오는 중...</div>
</header>

<div id="tab-home" class="tab-content active">
  <div class="card">
    <h2>빠른 이동</h2>
    <div class="quick-nav">
      <a href="https://gjdnddd.github.io/todo-app/" target="_blank">할 일</a>
      <a href="https://gjdnddd.github.io/control-tower/" target="_blank">컨트롤타워</a>
    </div>
  </div>

  <div class="card">
    <h2>자주 쓰는 자료</h2>
    <div id="pinned-list"></div>
  </div>

  <div class="card">
    <h2>자료지도 요약</h2>
    <div class="summary-row" id="home-summary">
      <span class="summary-pill">불러오는 중...</span>
    </div>
  </div>
</div>

<div id="tab-goals" class="tab-content">
  <div class="card">
    <h2>목표 추가</h2>
    <div class="goal-form-row">
      <select id="goal-period-type">
        <option value="year">연간</option>
        <option value="quarter">분기</option>
        <option value="month" selected>월</option>
        <option value="week">주</option>
      </select>
      <input type="text" id="goal-period-label" class="goal-title-input" placeholder="예: 2026-07" />
    </div>
    <div class="goal-form-row">
      <input type="text" id="goal-title" class="goal-title-input" placeholder="목표 제목 (예: 독서 4권)" />
    </div>
    <div class="goal-form-row">
      <input type="number" id="goal-target" class="goal-num-input" placeholder="목표 수치 (선택)" />
      <input type="text" id="goal-unit" class="goal-num-input" placeholder="단위 (예: 권, 회, %)" />
    </div>
    <button class="btn" onclick="addGoal()">목표 추가 후 Gist에 저장</button>
  </div>

  <div class="card">
    <h2>목표 현황</h2>
    <div id="goals-list"></div>
  </div>
</div>

<div id="tab-map" class="tab-content">
  <div class="card">
    <h2>자료지도 검색</h2>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="키워드로 검색 (예: 세금, 컨트롤타워)" />
    </div>
    <div id="search-results"></div>
  </div>

  <div class="card">
    <h2>자료 수동 등록</h2>
    <label class="form-label">이름</label>
    <input type="text" id="manual-name" placeholder="예: 2026 연말정산 자료" style="width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text1);font-size:13px;margin-bottom:8px;" />
    <label class="form-label">경로 또는 URL</label>
    <input type="text" id="manual-path" placeholder="폴더 경로 또는 웹 URL" style="width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text1);font-size:13px;margin-bottom:8px;" />
    <label class="form-label">키워드 (쉼표로 구분)</label>
    <input type="text" id="manual-keywords" placeholder="세금, 연말정산" style="width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text1);font-size:13px;margin-bottom:8px;" />
    <button class="btn" onclick="addManualItem()">추가 후 Gist에 저장</button>
  </div>

  <div class="card gist-section">
    <h2>Gist 연동</h2>
    <label class="form-label">Personal Access Token</label>
    <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" />
    <label class="form-label">Gist ID</label>
    <input type="text" id="gist-id-input" placeholder="adff7f6a437517b81a7186f3bce352c8" />
    <button onclick="saveGistConfig()">설정 저장</button>
    <button onclick="syncGist()" style="margin-left:8px;background:var(--bg3);color:var(--text1);">지금 불러오기</button>
  </div>
</div>

<div id="tab-map2" class="tab-content">
  <iframe class="map-frame" src="https://gjdnddd.github.io/react-workflow-map/" title="워크플로우 맵" loading="lazy"></iframe>
</div>

<div class="tabbar">
  <button class="active" data-tab="home" onclick="switchTab('home')">홈</button>
  <button data-tab="goals" onclick="switchTab('goals')">목표</button>
  <button data-tab="map" onclick="switchTab('map')">자료지도</button>
  <button data-tab="map2" onclick="switchTab('map2')">맵</button>
</div>

<div class="toast" id="toast"></div>

<script>
const GIST_FILENAME = 'hq_scan_result.json';
const GOALS_FILENAME = 'hq_goals.json';
const DEFAULT_GIST_ID = 'adff7f6a437517b81a7186f3bce352c8';
const PERIOD_LABELS = { year: '연간', quarter: '분기', month: '월', week: '주' };

let state = {
  gistToken: '',
  gistId: DEFAULT_GIST_ID,
  mapData: { updated_at: null, items: [] },
  goalsData: { updated_at: null, goals: [] },
};

function loadLocal() {
  const raw = localStorage.getItem('hq_state');
  if (raw) {
    try {
      const parsed = JSON.parse(raw);
      state = Object.assign(state, parsed);
    } catch (e) {}
  }
}

function saveLocal() {
  localStorage.setItem('hq_state', JSON.stringify(state));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tabbar button').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelector(`.tabbar button[data-tab="${name}"]`).classList.add('active');
}

// ══════════════════════════════════════════════
//  GIST API (기존 대시보드 패턴 재사용)
// ══════════════════════════════════════════════
async function syncGist() {
  const token = state.gistToken;
  const gistId = state.gistId;
  if (!gistId) { showToast('Gist ID를 먼저 입력해주세요'); return; }
  try {
    const headers = { Accept: 'application/vnd.github.v3+json' };
    if (token) headers.Authorization = `token ${token}`;
    const res = await fetch(`https://api.github.com/gists/${gistId}`, { headers });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();

    const mapContent = await readGistFile(data, GIST_FILENAME);
    if (mapContent) state.mapData = JSON.parse(mapContent);

    const goalsContent = await readGistFile(data, GOALS_FILENAME);
    if (goalsContent) state.goalsData = JSON.parse(goalsContent);

    saveLocal();
    renderAll();
    showToast('불러오기 완료');
  } catch (e) {
    showToast('불러오기 실패: ' + e.message);
  }
}

async function readGistFile(gistData, filename) {
  const file = gistData.files[filename];
  if (!file) return null;
  let content = file.content;
  if (file.truncated && file.raw_url) {
    const rawRes = await fetch(file.raw_url);
    if (!rawRes.ok) throw new Error(rawRes.status);
    content = await rawRes.text();
  }
  return content;
}

async function saveFileToGist(filename, dataObj, successMsg) {
  const token = state.gistToken;
  const gistId = state.gistId;
  if (!token || !gistId) { showToast('토큰과 Gist ID를 먼저 입력해주세요'); return; }
  try {
    const body = JSON.stringify({
      files: { [filename]: { content: JSON.stringify(dataObj, null, 2) } }
    });
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      method: 'PATCH',
      headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
      body
    });
    if (!res.ok) throw new Error(res.status);
    saveLocal();
    showToast(successMsg || 'Gist에 저장 완료');
  } catch (e) {
    showToast('Gist 저장 실패 — 토큰 확인');
  }
}

function saveToGist() {
  return saveFileToGist(GIST_FILENAME, state.mapData, '자료지도 저장 완료');
}

function saveGoalsToGist() {
  return saveFileToGist(GOALS_FILENAME, state.goalsData, '목표 저장 완료');
}

function saveGistConfig() {
  state.gistToken = document.getElementById('token-input').value.trim();
  state.gistId = document.getElementById('gist-id-input').value.trim() || DEFAULT_GIST_ID;
  saveLocal();
  showToast('설정 저장 완료');
}

// ══════════════════════════════════════════════
//  자료지도 렌더링
// ══════════════════════════════════════════════
function renderAll() {
  renderUpdatedLabel();
  renderPinned();
  renderHomeSummary();
  renderSearch(document.getElementById('search-input').value);
  renderGoals();
}

function renderPinned() {
  const el = document.getElementById('pinned-list');
  const items = (state.mapData.items || []).filter(it => it.pinned);
  if (!items.length) {
    el.innerHTML = '<div class="empty">아직 없어요. 자료지도 검색 결과에서 ★ 라벨 수정으로 추가해보세요.</div>';
    return;
  }
  el.innerHTML = items.map(it => resultItemHtml(it)).join('');
}

function renderUpdatedLabel() {
  const label = document.getElementById('updated-label');
  const items = state.mapData.items || [];
  if (!items.length) {
    label.textContent = '자료지도가 비어 있어요. Gist 연동에서 불러오세요.';
    return;
  }
  const dt = state.mapData.updated_at ? new Date(state.mapData.updated_at) : null;
  label.textContent = `자료 ${items.length}건` + (dt ? ` · ${dt.toLocaleDateString('ko-KR')} 기준` : '');
}

function renderHomeSummary() {
  const items = state.mapData.items || [];
  const el = document.getElementById('home-summary');
  if (!items.length) {
    el.innerHTML = '<span class="summary-pill">자료지도 없음</span>';
    return;
  }
  const byCategory = {};
  items.forEach(it => {
    const cat = (it.category || '기타').split('/')[0];
    byCategory[cat] = (byCategory[cat] || 0) + 1;
  });
  el.innerHTML = Object.entries(byCategory)
    .sort((a, b) => b[1] - a[1])
    .map(([cat, n]) => `<span class="summary-pill">${escapeHtml(cat)} <b>${n}</b></span>`)
    .join('');
}

function renderSearch(query) {
  const resultsEl = document.getElementById('search-results');
  const items = state.mapData.items || [];
  const q = (query || '').trim().toLowerCase();

  if (!q) {
    resultsEl.innerHTML = '<div class="empty">검색어를 입력하세요</div>';
    return;
  }

  const matched = items.filter(it => {
    const haystack = [it.name, it.category, ...(it.keywords || [])].join(' ').toLowerCase();
    return haystack.includes(q);
  }).slice(0, 100);

  if (!matched.length) {
    resultsEl.innerHTML = '<div class="empty">검색 결과가 없어요</div>';
    return;
  }

  resultsEl.innerHTML = matched.map(it => resultItemHtml(it)).join('');
}

function resultItemHtml(it) {
  const isUrl = /^https?:\/\//.test(it.path_or_url || '');
  const pathHtml = isUrl
    ? `<a href="${escapeHtml(it.path_or_url)}" target="_blank">${escapeHtml(it.path_or_url)}</a>`
    : escapeHtml(it.path_or_url || '');
  const star = it.pinned ? '★' : '☆';
  return `<div class="result-item">
    <div class="name">${escapeHtml(it.name)} <span style="color:var(--text3);font-size:11px;">[${escapeHtml(it.category || '')}]</span></div>
    <div class="meta">${pathHtml}</div>
    <button class="label-edit-btn" onclick="editLabel('${it.id}')">${star} 라벨 수정</button>
  </div>`;
}

function editLabel(id) {
  const item = (state.mapData.items || []).find(x => x.id === id);
  if (!item) return;

  const newName = prompt('라벨(이름)', item.name);
  if (newName === null) return;
  const newKeywords = prompt('키워드 (쉼표로 구분)', (item.keywords || []).join(', '));
  if (newKeywords === null) return;

  item.name = newName.trim() || item.name;
  item.keywords = newKeywords.split(',').map(k => k.trim()).filter(Boolean);
  item.pinned = true;
  item.source = item.source === 'scan' ? 'labeled' : item.source;
  state.mapData.updated_at = new Date().toISOString();

  saveLocal();
  renderAll();
  saveToGist();
}

function addManualItem() {
  const name = document.getElementById('manual-name').value.trim();
  const path = document.getElementById('manual-path').value.trim();
  const keywords = document.getElementById('manual-keywords').value.trim();
  if (!name || !path) { showToast('이름과 경로를 입력해주세요'); return; }

  const item = {
    id: crypto.randomUUID(),
    name,
    type: /^https?:\/\//.test(path) ? 'webapp' : 'folder',
    path_or_url: path,
    category: '수동등록',
    keywords: keywords.split(',').map(k => k.trim()).filter(Boolean),
    source: 'manual',
    pinned: true,
  };
  state.mapData.items = state.mapData.items || [];
  state.mapData.items.push(item);
  state.mapData.updated_at = new Date().toISOString();
  saveLocal();
  renderAll();

  document.getElementById('manual-name').value = '';
  document.getElementById('manual-path').value = '';
  document.getElementById('manual-keywords').value = '';

  saveToGist();
}

// ══════════════════════════════════════════════
//  목표
// ══════════════════════════════════════════════
function defaultPeriodLabel(type) {
  const now = new Date();
  const y = now.getFullYear();
  if (type === 'year') return String(y);
  if (type === 'quarter') return `${y}-Q${Math.floor(now.getMonth() / 3) + 1}`;
  if (type === 'week') {
    const firstDay = new Date(y, 0, 1);
    const week = Math.ceil(((now - firstDay) / 86400000 + firstDay.getDay() + 1) / 7);
    return `${y}-W${week}`;
  }
  return `${y}-${String(now.getMonth() + 1).padStart(2, '0')}`;
}

document.getElementById('goal-period-type').addEventListener('change', (e) => {
  document.getElementById('goal-period-label').value = defaultPeriodLabel(e.target.value);
});

function addGoal() {
  const periodType = document.getElementById('goal-period-type').value;
  const periodLabel = document.getElementById('goal-period-label').value.trim() || defaultPeriodLabel(periodType);
  const title = document.getElementById('goal-title').value.trim();
  const targetRaw = document.getElementById('goal-target').value.trim();
  const unit = document.getElementById('goal-unit').value.trim();
  if (!title) { showToast('목표 제목을 입력해주세요'); return; }

  const goal = {
    id: crypto.randomUUID(),
    period_type: periodType,
    period_label: periodLabel,
    title,
    target: targetRaw ? Number(targetRaw) : null,
    current: 0,
    unit,
    done: false,
    created_at: new Date().toISOString(),
  };
  state.goalsData.goals = state.goalsData.goals || [];
  state.goalsData.goals.push(goal);
  state.goalsData.updated_at = new Date().toISOString();
  saveLocal();
  renderGoals();

  document.getElementById('goal-title').value = '';
  document.getElementById('goal-target').value = '';
  document.getElementById('goal-unit').value = '';

  saveGoalsToGist();
}

function updateGoalCurrent(id) {
  const goal = (state.goalsData.goals || []).find(g => g.id === id);
  if (!goal) return;
  const raw = prompt(`현재 수치 (목표 ${goal.target}${goal.unit || ''})`, goal.current);
  if (raw === null) return;
  const num = Number(raw);
  if (Number.isNaN(num)) { showToast('숫자를 입력해주세요'); return; }
  goal.current = num;
  if (goal.target && num >= goal.target) goal.done = true;
  state.goalsData.updated_at = new Date().toISOString();
  saveLocal();
  renderGoals();
  saveGoalsToGist();
}

function toggleGoalDone(id) {
  const goal = (state.goalsData.goals || []).find(g => g.id === id);
  if (!goal) return;
  goal.done = !goal.done;
  state.goalsData.updated_at = new Date().toISOString();
  saveLocal();
  renderGoals();
  saveGoalsToGist();
}

function deleteGoal(id) {
  if (!confirm('이 목표를 삭제할까요?')) return;
  state.goalsData.goals = (state.goalsData.goals || []).filter(g => g.id !== id);
  state.goalsData.updated_at = new Date().toISOString();
  saveLocal();
  renderGoals();
  saveGoalsToGist();
}

function renderGoals() {
  const el = document.getElementById('goals-list');
  const goals = state.goalsData.goals || [];
  if (!goals.length) {
    el.innerHTML = '<div class="empty">아직 목표가 없어요. 위에서 추가해보세요.</div>';
    return;
  }

  const order = ['year', 'quarter', 'month', 'week'];
  const groups = {};
  goals.forEach(g => {
    const key = g.period_type || 'month';
    (groups[key] = groups[key] || []).push(g);
  });

  el.innerHTML = order
    .filter(type => groups[type] && groups[type].length)
    .map(type => {
      const items = groups[type].map(g => goalItemHtml(g)).join('');
      return `<div class="goal-group-title">${PERIOD_LABELS[type] || type}</div>${items}`;
    })
    .join('');
}

function goalItemHtml(g) {
  const hasTarget = g.target !== null && g.target !== undefined && g.target !== '' && !Number.isNaN(Number(g.target));
  const progressHtml = hasTarget
    ? (() => {
        const pct = Math.max(0, Math.min(100, Math.round((g.current / g.target) * 100)));
        return `<div class="goal-progress-wrap" onclick="updateGoalCurrent('${g.id}')">
          <div class="goal-progress-bar"><div class="goal-progress-fill" style="width:${pct}%"></div></div>
          <div class="goal-progress-pct">${g.current}${escapeHtml(g.unit || '')}/${g.target}${escapeHtml(g.unit || '')}</div>
        </div>`;
      })()
    : `<div class="goal-check ${g.done ? 'done' : ''}" onclick="toggleGoalDone('${g.id}')">${g.done ? '✅ 완료' : '⬜ 완료 표시'}</div>`;

  return `<div class="goal-item">
    <div class="goal-top">
      <div><span class="goal-title">${escapeHtml(g.title)}</span><span class="goal-period">${escapeHtml(g.period_label || '')}</span></div>
      <div class="goal-actions"><button onclick="deleteGoal('${g.id}')" title="삭제">✕</button></div>
    </div>
    ${progressHtml}
  </div>`;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

document.getElementById('search-input').addEventListener('input', (e) => renderSearch(e.target.value));

// 초기화
loadLocal();
document.getElementById('token-input').value = state.gistToken || '';
document.getElementById('gist-id-input').value = state.gistId || DEFAULT_GIST_ID;
document.getElementById('goal-period-label').value = defaultPeriodLabel('month');
state.goalsData = state.goalsData || { updated_at: null, goals: [] };
renderAll();
if (!state.mapData.items || !state.mapData.items.length) {
  syncGist();
}
</script>

</body>
</html>
